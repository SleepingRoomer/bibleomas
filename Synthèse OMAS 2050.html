document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

}\n  .syn-line { stroke-dasharray: 220; stroke-dashoffset: 220; animation: synDraw .9s ease forwards; }\n  @media (max-width: 780px) {\n    #syn-sysmap { display: none !important; }\n    #syn-toggle { display: none !important; }\n    #syn-drawer { width: 100vw !important; }\n    .syn-mobilehint { display: block !important; }\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div id=\"syn-scroll\" style=\"height:100vh; overflow-y:auto; background:#F4F4EE; font-family:'Manrope',system-ui,sans-serif; color:#1B1C33; -webkit-font-smoothing:antialiased;\">\n\n  <!-- HEADER -->\n  <header style=\"position:sticky; top:0; z-index:40; display:flex; align-items:center; gap:16px; padding:14px 26px; background:rgba(244,244,238,0.86); backdrop-filter:blur(12px); border-bottom:1px solid #E4E4DC;\">\n    <div style=\"display:flex; align-items:center; gap:11px;\">\n      <svg width=\"30\" height=\"30\" viewBox=\"0 0 100 100\" aria-label=\"OMAS\"><circle cx=\"32\" cy=\"38\" r=\"23\" fill=\"#00A09A\"><\u002Fcircle><circle cx=\"68\" cy=\"38\" r=\"23\" fill=\"#2D2F84\"><\u002Fcircle><polygon points=\"10,46 50,46 50,93\" fill=\"#00A09A\"><\u002Fpolygon><polygon points=\"50,46 90,46 50,93\" fill=\"#2D2F84\"><\u002Fpolygon><\u002Fsvg>\n      <div style=\"line-height:1.12;\">\n        <div style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; letter-spacing:.5px; color:#2D2F84;\">OMAS 2050<\u002Fdiv>\n        <div style=\"font-size:10.5px; color:#8A8CA0; letter-spacing:.4px;\">La synthèse en 9 idées<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;\"><\u002Fdiv>\n    <div id=\"syn-toggle\" style=\"display:flex; background:#EAEAE2; border-radius:11px; padding:4px; gap:2px;\">\n      <button id=\"syn-tab-sys\" style=\"border:none; cursor:pointer; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13px; padding:8px 16px; border-radius:8px;\">Carte-système<\u002Fbutton>\n      <button id=\"syn-tab-cards\" style=\"border:none; cursor:pointer; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13px; padding:8px 16px; border-radius:8px;\">Cartes<\u002Fbutton>\n    <\u002Fdiv>\n    <a href=\"Explorateur OMAS.dc.html\" style=\"display:inline-flex; align-items:center; gap:7px; text-decoration:none; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13px; color:#2D2F84; border:1px solid #D7D7CC; padding:8px 15px; border-radius:9px; background:#fff;\">\n      <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#00A09A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 5h11M4 12h11M4 19h7\"><\u002Fpath><path d=\"M17 8l4 4-4 4\"><\u002Fpath><\u002Fsvg>\n      Bible complète\n    <\u002Fa>\n  <\u002Fheader>\n\n  <!-- INTRO -->\n  <div style=\"max-width:920px; margin:0 auto; padding:22px 26px 2px; text-align:center;\">\n    <h1 style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:clamp(24px,3.4vw,34px); line-height:1.1; color:#1B1C33; margin:0; text-wrap:balance;\">Neuf idées-force pour comprendre <span style=\"color:#2D2F84;\">OMAS&nbsp;2050<\u002Fspan><\u002Fh1>\n    <p style=\"max-width:560px; margin:11px auto 0; font-size:14.5px; line-height:1.55; color:#6A6C80;\">Explorez la carte du système ou parcourez les cartes&nbsp;: chaque idée se déplie et renvoie au corpus détaillé.<\u002Fp>\n    <div class=\"syn-mobilehint\" style=\"display:none; margin-top:12px; font-size:13px; color:#A9852F; font-weight:600;\">Astuce&nbsp;: touchez une carte pour la déplier.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- VIEW: SYSTEM MAP -->\n  <section id=\"syn-view-sys\" style=\"max-width:1040px; margin:0 auto; padding:10px 26px 70px;\">\n    <div id=\"syn-sysmap\" style=\"position:relative; width:100%; aspect-ratio:100/70; margin:8px auto 0;\"><\u002Fdiv>\n    <div class=\"syn-mobilehint\" id=\"syn-sys-fallback\" style=\"display:none;\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- VIEW: CARDS -->\n  <section id=\"syn-view-cards\" style=\"display:none; max-width:1120px; margin:0 auto; padding:22px 26px 90px;\">\n    <div id=\"syn-cardgrid\" style=\"display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; align-items:start;\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- DRAWER -->\n  <div id=\"syn-overlay\" style=\"position:fixed; inset:0; background:rgba(20,20,40,0.34); opacity:0; pointer-events:none; transition:opacity .3s; z-index:50;\"><\u002Fdiv>\n  <aside id=\"syn-drawer\" style=\"position:fixed; top:0; right:0; height:100vh; width:min(500px, 94vw); background:#FBFBF7; box-shadow:-16px 0 50px rgba(20,20,50,0.18); transform:translateX(102%); transition:transform .38s cubic-bezier(.4,0,.2,1); z-index:51; overflow-y:auto;\"><\u002Faside>\n\n  \n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    this.mode = 'sys';\n    this.openIdx = -1;\n    this.expandedCard = -1;\n    this.data();\n    this.buildSysmap();\n    this.buildCards();\n    this.wireTabs();\n    this.setMode('sys');\n  }\n\n  esc(s) { return String(s).replace(/&/g, '&amp;').replace(/<\u002Fg, '&lt;').replace(/>/g, '&gt;').replace(/\"/g, '&quot;'); }\n  link(q) { return 'Explorateur OMAS.dc.html?q=' + encodeURIComponent(q); }\n\n  data() {\n    const T = '#00A09A', B = '#2D2F84', O = '#C8A951';\n    // icon = inner SVG paths, drawn in a 24x24 stroke frame\n    this.ideas = [\n      {\n        n: '01', title: 'La vision 2050', accent: B, tag: 'Un cap en trois horizons, de la consolidation à l\\u2019institution.',\n        icon: '<circle cx=\"12\" cy=\"12\" r=\"8\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"3.2\"><\u002Fcircle>',\n        schema: 'vision',\n        points: [\n          'Devenir l\\u2019institution de r\\u00e9f\\u00e9rence des acteurs de sant\\u00e9, sur tout le territoire et \\u00e0 l\\u2019international.',\n          'Trois horizons aux logiques distinctes : d\\u2019abord construire, puis d\\u00e9ployer, enfin faire rayonner.',\n          'Un cap long qui donne du souffle, d\\u00e9clin\\u00e9 par les plans strat\\u00e9giques successifs.'\n        ],\n        q: 'Vision 2050 : les trois horizons'\n      },\n      {\n        n: '02', title: 'Nos valeurs', accent: O, tag: 'Trois racines qui nourrissent cinq valeurs vécues.',\n        icon: '<path d=\"M12 22V9\"><\u002Fpath><path d=\"M12 9c0-3 2.5-5 5.5-5 0 3-2.5 5-5.5 5Z\"><\u002Fpath><path d=\"M12 12C12 9 9.5 7 6.5 7c0 3 2.5 5 5.5 5Z\"><\u002Fpath>',\n        schema: 'valeurs',\n        points: [\n          'Trois racines fondatrices : Am\\u00e2nah (la responsabilit\\u00e9), Ihs\\u00e2n (l\\u2019excellence), Khidma (le service).',\n          'Cinq valeurs op\\u00e9rationnelles en d\\u00e9coulent : excellence, \\u00e9thique, solidarit\\u00e9, service, ind\\u00e9pendance.',\n          'L\\u2019ind\\u00e9pendance est la condition de fid\\u00e9lit\\u00e9 aux quatre autres : personne ne sert deux ma\\u00eetres.'\n        ],\n        q: 'articulation des valeurs'\n      },\n      {\n        n: '03', title: 'Trois axes', accent: T, tag: 'Thématique, professionnel, territorial : ils se croisent, ne se remplacent pas.',\n        icon: '<path d=\"M3 12h18\"><\u002Fpath><path d=\"M12 3v18\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"2.4\"><\u002Fcircle>',\n        schema: 'axes',\n        points: [\n          'L\\u2019axe th\\u00e9matique : six p\\u00f4les (Savoir, \\u00c9thique, Solidarit\\u00e9s, R\\u00e9seau, Recherche, D\\u00e9veloppement).',\n          'L\\u2019axe professionnel : les fili\\u00e8res m\\u00e9tier (m\\u00e9decine, pharmacie, odontologie, psycho, kin\\u00e9-ost\\u00e9o).',\n          'L\\u2019axe territorial : localit\\u00e9s, antennes et r\\u00e9gions. Un projet peut combiner les trois.'\n        ],\n        q: 'trois axes structurants'\n      },\n      {\n        n: '04', title: 'Trois échelons', accent: B, tag: 'National, localité, antenne — un même modèle à géométrie variable.',\n        icon: '<path d=\"M12 3 3 8l9 5 9-5-9-5Z\"><\u002Fpath><path d=\"m3 13 9 5 9-5\"><\u002Fpath>',\n        schema: 'echelons',\n        points: [\n          'Le national d\\u00e9finit le cadre, la localit\\u00e9 porte le budget et l\\u2019action, l\\u2019antenne est au plus pr\\u00e8s du campus.',\n          'G\\u00e9om\\u00e9trie variable : le m\\u00eame mod\\u00e8le partout, activ\\u00e9 selon la maturit\\u00e9 locale (types A, B, C).',\n          'Certains principes ne sont jamais n\\u00e9gociables, quel que soit le type de localit\\u00e9.'\n        ],\n        q: 'géométrie variable'\n      },\n      {\n        n: '05', title: 'La choura', accent: O, tag: 'Consulter, trancher, assumer : le juste milieu de la décision.',\n        icon: '<path d=\"M12 3v3\"><\u002Fpath><path d=\"M5 6h14\"><\u002Fpath><path d=\"M6 6 3 13a3.2 3.2 0 0 0 6 0L6 6Z\"><\u002Fpath><path d=\"M18 6l-3 7a3.2 3.2 0 0 0 6 0l-3-7Z\"><\u002Fpath><path d=\"M9 20h6\"><\u002Fpath>',\n        schema: 'choura',\n        points: [\n          'Celui qui d\\u00e9cide consulte obligatoirement, puis tranche et assume sa d\\u00e9cision.',\n          'Les organes consult\\u00e9s disposent d\\u2019un v\\u00e9to suspensif : une alerte qui oblige \\u00e0 r\\u00e9examiner, jamais un blocage.',\n          'Le juste milieu entre le chef qui d\\u00e9cide seul et le comit\\u00e9 qui ne d\\u00e9cide jamais.'\n        ],\n        q: 'Choura : délibération et décision'\n      },\n      {\n        n: '06', title: 'Le parcours omassien', accent: T, tag: 'Compétence, engagement, éthique : une spirale, pas un escalier.',\n        icon: '<path d=\"M12 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0-2 0\"><\u002Fpath><path d=\"M12 12a3 3 0 0 1 3 3 5 5 0 0 1-5 5 7 7 0 0 1-7-7 9 9 0 0 1 9-9 11 11 0 0 1 8 3\"><\u002Fpath>',\n        schema: 'parcours',\n        points: [\n          'Trois dimensions indissociables : la comp\\u00e9tence, l\\u2019engagement, l\\u2019\\u00e9thique et la spiritualit\\u00e9.',\n          'Une logique de spirale : on apprend et on transmet d\\u00e8s le premier jour, les th\\u00e9matiques s\\u2019affinent avec le cursus.',\n          'On n\\u2019accompagne pas un candidat \\u00e0 un concours, on accueille un membre dans une communaut\\u00e9.'\n        ],\n        q: 'parcours omassien'\n      },\n      {\n        n: '07', title: 'Territoire & filière', accent: B, tag: 'Deux appartenances articulées, jamais concurrentes.',\n        icon: '<path d=\"M4 7v13l5-2 6 2 5-2V5l-5 2-6-2-5 2Z\"><\u002Fpath><path d=\"M9 5v13\"><\u002Fpath><path d=\"M15 7v13\"><\u002Fpath>',\n        schema: 'territoire',\n        points: [\n          'Chaque membre appartient \\u00e0 un ancrage territorial : son campus, sa promo, puis sa communaut\\u00e9 pro de territoire.',\n          'Et \\u00e0 une fili\\u00e8re m\\u00e9tier, qui suit son parcours professionnel.',\n          'Le territoire relie les m\\u00e9tiers entre eux ; la fili\\u00e8re relie les g\\u00e9n\\u00e9rations d\\u2019un m\\u00eame m\\u00e9tier.'\n        ],\n        q: 'Un projet OMAS peut combiner les trois'\n      },\n      {\n        n: '08', title: 'La gouvernance', accent: O, tag: 'Un triangle d\\u2019équilibre autour d\\u2019un président pivot.',\n        icon: '<path d=\"M12 3 2 20h20L12 3Z\"><\u002Fpath><circle cx=\"12\" cy=\"14.5\" r=\"2.2\"><\u002Fcircle>',\n        schema: 'gouvernance',\n        points: [\n          'Trois organes : le Comit\\u00e9 strat\\u00e9gique (le long terme), le Coll\\u00e8ge des repr\\u00e9sentants (le contr\\u00f4le), le Bureau ex\\u00e9cutif (l\\u2019action).',\n          'Le Coll\\u00e8ge dispose d\\u2019un v\\u00e9to suspensif ; le pr\\u00e9sident est le pivot qui assure la coh\\u00e9rence.',\n          'Ni pr\\u00e9sidentialisme o\\u00f9 une personne d\\u00e9cide de tout, ni parlementarisme o\\u00f9 plus personne ne d\\u00e9cide.'\n        ],\n        q: 'triangle de l\\u2019équilibre'\n      },\n      {\n        n: '09', title: 'Le passage à l\\u2019action', accent: T, tag: 'Posture feu vert : on met en place la nouvelle organisation dès maintenant.',\n        icon: '<path d=\"M5 3v18\"><\u002Fpath><path d=\"M5 4h11l-2 4 2 4H5\"><\u002Fpath>',\n        schema: 'action',\n        points: [\n          'On d\\u00e9ploie la nouvelle organisation sans attendre, avec un calendrier de d\\u00e9marrage.',\n          'Chaque responsable a d\\u00e9sormais une place claire dans le projet.',\n          'Voici ta place&nbsp;: le moment de prendre des responsabilit\\u00e9s, c\\u2019est maintenant.'\n        ],\n        q: 'séquence de transition'\n      }\n    ];\n  }\n\n  // ---------- SCHEMAS ----------\n  schemaHTML(idea) {\n    const a = idea.accent, T = '#00A09A', B = '#2D2F84', O = '#C8A951';\n    const chip = (bg, fg, txt, sub) => '<div style=\"background:' + bg + '; color:' + fg + '; border-radius:10px; padding:9px 12px; text-align:center; line-height:1.2;\"><div style=\"font-family:\\'Space Grotesk\\',sans-serif; font-weight:700; font-size:13px;\">' + txt + '<\u002Fdiv>' + (sub ? '<div style=\"font-size:10px; opacity:.8; margin-top:2px;\">' + sub + '<\u002Fdiv>' : '') + '<\u002Fdiv>';\n\n    if (idea.schema === 'vision') {\n      const rows = [\n        { yr: '2026\\u201330', nm: 'Consolidation', d: 'Construire la machine', w: 46, c: T },\n        { yr: '2030\\u201336', nm: 'Expansion', d: 'D\\u00e9ployer la machine', w: 72, c: B },\n        { yr: '2036\\u201350', nm: 'Institution', d: 'Acteur incontournable', w: 100, c: O }\n      ];\n      return '<div style=\"display:flex; flex-direction:column; gap:11px;\">' + rows.map(function (r) {\n        return '<div><div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px;\"><span style=\"font-family:\\'Space Grotesk\\',sans-serif; font-weight:700; font-size:14px; color:#1B1C33;\">' + r.nm + '<\u002Fspan><span style=\"font-size:11px; color:#8A8CA0; font-weight:600;\">' + r.yr + '<\u002Fspan><\u002Fdiv><div style=\"height:26px; border-radius:7px; background:#EDEDE4; overflow:hidden;\"><div style=\"height:100%; width:' + r.w + '%; background:' + r.c + '; border-radius:7px; display:flex; align-items:center; padding-left:11px;\"><span style=\"color:#fff; font-size:11px; font-weight:600;\">' + r.d + '<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n      }).join('') + '<\u002Fdiv>';\n    }\n\n    if (idea.schema === 'valeurs') {\n      const racines = [['Am\\u00e2nah', 'Responsabilit\\u00e9'], ['Ihs\\u00e2n', 'Excellence'], ['Khidma', 'Service']];\n      const valeurs = ['Excellence', '\\u00c9thique', 'Solidarit\\u00e9', 'Service', 'Ind\\u00e9pendance'];\n      return '<div>'\n        + '<div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:8px;\">' + racines.map(function (r) { return chip('#2D2F84', '#fff', r[0], r[1]); }).join('') + '<\u002Fdiv>'\n        + '<svg viewBox=\"0 0 300 26\" preserveAspectRatio=\"none\" style=\"width:100%; height:22px; display:block;\"><g stroke=\"#C8A951\" stroke-width=\"1.4\" fill=\"none\" opacity=\"0.7\">'\n        + '<path d=\"M50 0 V13 H30 V26\"><\u002Fpath><path d=\"M50 0 V13 H90 V26\"><\u002Fpath><path d=\"M150 0 V26\"><\u002Fpath><path d=\"M150 0 V13 H210 V26\"><\u002Fpath><path d=\"M250 0 V13 H270 V26\"><\u002Fpath>'\n        + '<\u002Fg><\u002Fsvg>'\n        + '<div style=\"display:grid; grid-template-columns:repeat(5,1fr); gap:6px;\">' + valeurs.map(function (v) { return '<div style=\"background:#FBF6E6; color:#A9852F; border:1px solid #EAD9A6; border-radius:8px; padding:8px 4px; text-align:center; font-weight:700; font-size:11px; font-family:\\'Space Grotesk\\',sans-serif;\">' + v + '<\u002Fdiv>'; }).join('') + '<\u002Fdiv>'\n        + '<\u002Fdiv>';\n    }\n\n    if (idea.schema === 'axes') {\n      const cols = [\n        { t: 'Th\\u00e9matique', c: T, items: ['Savoir', '\\u00c9thique', 'Solidarit\\u00e9s', 'R\\u00e9seau', 'Recherche', 'D\\u00e9veloppement'] },\n        { t: 'Professionnel', c: B, items: ['M\\u00e9decine', 'Pharmacie', 'Odontologie', 'Psychologie', 'Kin\\u00e9-ost\\u00e9o'] },\n        { t: 'Territorial', c: O, items: ['R\\u00e9gion', 'Localit\\u00e9', 'Antenne'] }\n      ];\n      return '<div style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:9px;\">' + cols.map(function (col) {\n        return '<div style=\"border:1px solid #E4E4DC; border-top:3px solid ' + col.c + '; border-radius:10px; padding:11px 10px; background:#fff;\"><div style=\"font-family:\\'Space Grotesk\\',sans-serif; font-weight:700; font-size:12px; color:' + col.c + '; margin-bottom:8px;\">' + col.t + '<\u002Fdiv>' + col.items.map(function (it) { return '<div style=\"font-size:11.5px; color:#4A4C63; padding:2.5px 0;\">' + it + '<\u002Fdiv>'; }).join('') + '<\u002Fdiv>';\n      }).join('') + '<\u002Fdiv>';\n    }\n\n    if (idea.schema === 'echelons') {\n      const rows = [\n        { nm: 'National', d: 'D\\u00e9finit le cadre', w: 52, c: B },\n        { nm: 'Localit\\u00e9', d: 'Porte le budget et l\\u2019action', w: 76, c: T },\n        { nm: 'Antenne', d: 'Au plus pr\\u00e8s du campus', w: 100, c: O }\n      ];\n      return '<div style=\"display:flex; flex-direction:column; align-items:center; gap:7px;\">' + rows.map(function (r) {\n        return '<div style=\"width:' + r.w + '%; background:' + r.c + '; border-radius:9px; padding:9px 14px; color:#fff; display:flex; justify-content:space-between; align-items:center; gap:10px;\"><span style=\"font-family:\\'Space Grotesk\\',sans-serif; font-weight:700; font-size:13px;\">' + r.nm + '<\u002Fspan><span style=\"font-size:10.5px; opacity:.85;\">' + r.d + '<\u002Fspan><\u002Fdiv>';\n      }).join('') + '<div style=\"margin-top:4px; font-size:11px; color:#A9852F; font-weight:600;\">G\\u00e9om\\u00e9trie variable : types A / B / C selon la maturit\\u00e9<\u002Fdiv><\u002Fdiv>';\n    }\n\n    if (idea.schema === 'choura') {\n      const steps = [['Consulter', 'obligatoire', T], ['Trancher', 'clairement', B], ['Assumer', 'la d\\u00e9cision', O]];\n      return '<div><div style=\"display:flex; align-items:stretch; gap:6px;\">' + steps.map(function (s, i) {\n        return chip(s[2], '#fff', s[0], s[1]) + (i < 2 ? '<div style=\"display:flex; align-items:center; color:#B7B7AC; font-weight:700;\">\\u2192<\u002Fdiv>' : '');\n      }).join('') + '<\u002Fdiv><div style=\"margin-top:10px; background:#FBF6E6; border:1px dashed #E0CE93; border-radius:9px; padding:9px 12px; font-size:11.5px; color:#A9852F; text-align:center;\"><strong style=\"color:#8f6f22;\">V\\u00e9to suspensif<\u002Fstrong> \\u00b7 une alerte qui fait r\\u00e9examiner, jamais un blocage<\u002Fdiv><\u002Fdiv>';\n    }\n\n    if (idea.schema === 'parcours') {\n      return '<div style=\"display:flex; align-items:center; gap:16px;\">'\n        + '<svg viewBox=\"0 0 120 120\" style=\"width:118px; height:118px; flex:0 0 auto;\"><g fill=\"none\" stroke-linecap=\"round\"><path d=\"M60 60 A6 6 0 0 1 66 66 A16 16 0 0 1 50 82 A26 26 0 0 1 24 56 A36 36 0 0 1 60 20 A46 46 0 0 1 106 66\" stroke=\"#00A09A\" stroke-width=\"4\"><\u002Fpath><\u002Fg><circle cx=\"60\" cy=\"60\" r=\"4\" fill=\"#2D2F84\"><\u002Fcircle><\u002Fsvg>'\n        + '<div style=\"display:flex; flex-direction:column; gap:7px; flex:1;\">'\n        + chip('#00A09A', '#fff', 'Comp\\u00e9tence', 'savoir et savoir-faire')\n        + chip('#2D2F84', '#fff', 'Engagement', 'servir et transmettre')\n        + chip('#C8A951', '#fff', '\\u00c9thique', 'sens et spiritualit\\u00e9')\n        + '<\u002Fdiv><\u002Fdiv>';\n    }\n\n    if (idea.schema === 'territoire') {\n      return '<div style=\"position:relative; border:1px solid #E4E4DC; border-radius:12px; padding:16px; background:#fff;\">'\n        + '<div style=\"display:flex; align-items:center; gap:8px; margin-bottom:10px;\"><span style=\"background:#2D2F84; color:#fff; font-family:\\'Space Grotesk\\',sans-serif; font-weight:700; font-size:11px; padding:5px 10px; border-radius:20px;\">Territoire<\u002Fspan><span style=\"font-size:11px; color:#5A5C72;\">relie les m\\u00e9tiers entre eux \\u2192<\u002Fspan><\u002Fdiv>'\n        + b.addEventListener('click', () => this.openDrawer(+b.getAttribute('data-idx'))));\n    }\n  }\n\n  // ---------- CARDS ----------\n  buildCards() {\n    const grid = document.getElementById('syn-cardgrid');\n    if (!grid) return;\n    grid.innerHTML = this.ideas.map((idea, i) => {\n      return '<div class=\"syn-card\" data-card=\"' + i + '\" style=\"grid-column:auto; background:#fff; border:1px solid #E7E7DE; border-radius:16px; overflow:hidden; animation-delay:' + (i * 0.05) + 's; transition:box-shadow .25s, border-color .25s;\">'\n        + '<button data-toggle=\"' + i + '\" style=\"width:100%; text-align:left; border:none; background:transparent; cursor:pointer; padding:18px; display:flex; gap:14px; align-items:flex-start;\">'\n        + '<div style=\"width:44px; height:44px; border-radius:12px; background:' + idea.accent + '15; display:flex; align-items:center; justify-content:center; flex:0 0 auto;\"><svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"' + idea.accent + '\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">' + idea.icon + '<\u002Fsvg><\u002Fdiv>'\n        + '<div style=\"flex:1; min-width:0;\"><div style=\"font-family:\\'Space Grotesk\\',sans-serif; font-weight:700; font-size:11.5px; letter-spacing:.5px; color:' + idea.accent + ';\">' + idea.n + '<\u002Fdiv><div style=\"font-family:\\'Space Grotesk\\',sans-serif; font-weight:700; font-size:17px; line-height:1.2; color:#1B1C33; margin-top:1px;\">' + this.esc(idea.title) + '<\u002Fdiv><div style=\"font-size:13px; color:#6A6C80; line-height:1.45; margin-top:6px;\">' + idea.tag + '<\u002Fdiv><\u002Fdiv>'\n        + '<span data-caret=\"' + i + '\" style=\"flex:0 0 auto; color:#B7B7AC; font-size:18px; transition:transform .3s; margin-top:2px;\">\\u203a<\u002Fspan>'\n        + '<\u002Fbutton>'\n        + '<div data-body=\"' + i + '\" style=\"max-height:0; overflow:hidden; transition:max-height .4s ease;\"><div style=\"padding:0 18px 20px;\">' + this.detailHTML(idea, i, false) + '<\u002Fdiv><\u002Fdiv>'\n        + '<\u002Fdiv>';\n    }).join('');\n\n    grid.querySelectorAll('[data-toggle]').forEach((btn) => {\n      btn.addEventListener('click', () => this.toggleCard(+btn.getAttribute('data-toggle')));\n    });\n  }\n\n  toggleCard(i) {\n    const grid = document.getElementById('syn-cardgrid');\n    const card = grid.querySelector('[data-card=\"' + i + '\"]');\n    const body = grid.querySelector('[data-body=\"' + i + '\"]');\n    const caret = grid.querySelector('[data-caret=\"' + i + '\"]');\n    const isOpen = this.expandedCard === i;\n    // close previously open\n    if (this.expandedCard >= 0 && this.expandedCard !== i) {\n      const pc = grid.querySelector('[data-card=\"' + this.expandedCard + '\"]');\n      const pb = grid.querySelector('[data-body=\"' + this.expandedCard + '\"]');\n      const pcar = grid.querySelector('[data-caret=\"' + this.expandedCard + '\"]');\n      if (pb) pb.style.maxHeight = '0';\n      if (pc) { pc.style.gridColumn = 'auto'; pc.style.boxShadow = 'none'; pc.style.borderColor = '#E7E7DE'; }\n      if (pcar) pcar.style.transform = 'none';\n    }\n    if (isOpen) {\n      body.style.maxHeight = '0';\n      card.style.gridColumn = 'auto';\n      card.style.boxShadow = 'none';\n      card.style.borderColor = '#E7E7DE';\n      caret.style.transform = 'none';\n      this.expandedCard = -1;\n    } else {\n      card.style.gridColumn = '1 / -1';\n      card.style.boxShadow = '0 16px 40px rgba(30,30,60,0.1)';\n      card.style.borderColor = this.ideas[i].accent;\n      caret.style.transform = 'rotate(90deg)';\n      body.style.maxHeight = '900px';\n      this.expandedCard = i;\n      setTimeout(() => { const r = card.getBoundingClientRect(); const sc = document.getElementById('syn-scroll'); if (r.top < 90) sc.scrollTo({ top: sc.scrollTop + r.top - 90, behavior: 'smooth' }); }, 120);\n    }\n  }\n\n  // ---------- DRAWER ----------\n  openDrawer(i) {\n    this.openIdx = i;\n    const idea = this.ideas[i];\n    const dr = document.getElementById('syn-drawer');\n    const ov = document.getElementById('syn-overlay');\n    dr.innerHTML = '<div style=\"position:relative; padding:26px 26px 40px;\">'\n      + '<button id=\"syn-close\" style=\"position:absolute; top:18px; right:18px; width:36px; height:36px; border:1px solid #E4E4DC; background:#fff; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#5A5C72; font-size:17px;\">\\u2715<\u002Fbutton>'\n      + '<div style=\"height:5px; width:44px; background:' + idea.accent + '; border-radius:3px; margin-bottom:20px;\"><\u002Fdiv>'\n      + this.detailHTML(idea, i, true)\n      + '<\u002Fdiv>';\n    dr.style.transform = 'translateX(0)';\n    ov.style.opacity = '1';\n    ov.style.pointerEvents = 'auto';\n    document.getElementById('syn-close').addEventListener('click', () => this.closeDrawer());\n    dr.querySelectorAll('.syn-navbtn').forEach((b) => b.addEventListener('click', () => this.openDrawer(+b.getAttribute('data-nav'))));\n    dr.scrollTop = 0;\n  }\n\n  closeDrawer() {\n    document.getElementById('syn-drawer').style.transform = 'translateX(102%)';\n    const ov = document.getElementById('syn-overlay');\n    ov.style.opacity = '0';\n    ov.style.pointerEvents = 'none';\n    this.openIdx = -1;\n  }\n\n  // ---------- TABS ----------\n  wireTabs() {\n    document.getElementById('syn-tab-sys').addEventListener('click', () => this.setMode('sys'));\n    document.getElementById('syn-tab-cards').addEventListener('click', () => this.setMode('cards'));\n    document.getElementById('syn-overlay').addEventListener('click', () => this.closeDrawer());\n    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') this.closeDrawer(); });\n  }\n\n  setMode(m) {\n    this.mode = m;\n    const sys = document.getElementById('syn-view-sys');\n    const cards = document.getElementById('syn-view-cards');\n    const tS = document.getElementById('syn-tab-sys');\n    const tC = document.getElementById('syn-tab-cards');\n    const on = { background: '#fff', color: '#2D2F84', boxShadow: '0 1px 4px rgba(0,0,0,0.08)' };\n    const off = { background: 'transparent', color: '#8A8CA0', boxShadow: 'none' };\n    const apply = (el, s) => { el.style.background = s.background; el.style.color = s.color; el.style.boxShadow = s.boxShadow; };\n    if (m === 'sys') { sys.style.display = ''; cards.style.display = 'none'; apply(tS, on); apply(tC, off); }\n    else { sys.style.display = 'none'; cards.style.display = ''; apply(tS, off); apply(tC, on); }\n  }\n\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
