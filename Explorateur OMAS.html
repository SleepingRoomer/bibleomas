  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

22, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"b3f6ceda-e143-4a98-a69d-194cf7fc007d\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"5319fea1-97be-4055-880e-e06e961bcd9b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"d9f14cef-9b4d-4808-9051-a34edfb29ab9\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"7ab9d9d3-23bd-45d1-962f-805196a3062d\"><\u002Fscript>\n<script src=\"274bc7ea-9c1b-41df-9a31-2c49a84268a3\"><\u002Fscript>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  #omas-main::-webkit-scrollbar, #omas-sidebar::-webkit-scrollbar, #omas-results::-webkit-scrollbar { width: 9px; }\n  #omas-main::-webkit-scrollbar-thumb, #omas-sidebar::-webkit-scrollbar-thumb, #omas-results::-webkit-scrollbar-thumb { background: #D5D6CC; border-radius: 6px; }\n  .omas-prose{ color:#33344A; font-size:17px; line-height:1.78; }\n  .omas-prose > *:first-child{ margin-top:0; }\n  .omas-prose p{ margin:0 0 1.15em; }\n  .omas-prose h2{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:26px; line-height:1.22; color:#2D2F84; margin:2.4em 0 .7em; padding-top:1.7em; border-top:1px solid #E7E7DE; scroll-margin-top:20px; }\n  .omas-prose h2:first-of-type{ border-top:none; padding-top:0; margin-top:.3em; }\n  .omas-prose h3{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:19.5px; color:#1B1C33; margin:1.9em 0 .5em; }\n  .omas-prose h4{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13px; letter-spacing:1.4px; text-transform:uppercase; color:#A9852F; margin:1.7em 0 .4em; }\n  .omas-prose h5{ font-weight:700; font-size:15px; color:#00A09A; margin:1.4em 0 .3em; }\n  .omas-prose strong{ color:#16172B; font-weight:700; }\n  .omas-prose em{ color:#5A5C72; }\n  .omas-prose ul, .omas-prose ol{ margin:0 0 1.2em; padding-left:1.35em; }\n  .omas-prose li{ margin:0 0 .5em; }\n  .omas-prose li::marker{ color:#00A09A; }\n  .omas-prose blockquote{ margin:1.6em 0; padding:16px 22px; background:#FBF6E6; border-left:4px solid #C8A951; border-radius:0 10px 10px 0; color:#5c5330; }\n  .omas-prose blockquote p{ margin:0; }\n  .omas-prose blockquote p + p{ margin-top:.7em; }\n  .omas-prose hr{ border:none; border-top:1px solid #E7E7DE; margin:2.4em 0; }\n  .omas-prose a{ color:#00A09A; text-decoration:underline; text-underline-offset:2px; }\n  .omas-prose table{ width:100%; border-collapse:collapse; margin:1.6em 0; font-size:15px; }\n  .omas-prose th{ background:#2D2F84; color:#fff; text-align:left; padding:11px 14px; font-weight:600; }\n  .omas-prose td{ border:1px solid #E4E4DC; padding:10px 14px; vertical-align:top; }\n  .omas-prose tbody tr:nth-child(even) td{ background:#FAFAF6; }\n  .omas-prose mark{ background:#F6E6A8; color:inherit; padding:1px 2px; border-radius:3px; }\n  .omas-prose code{ background:#EDEEE6; padding:2px 6px; border-radius:5px; font-size:14px; font-family:ui-monospace,monospace; }\n  #omas-menu-btn{ display:none; }\n  @media (max-width: 880px){\n    #omas-sidebar{ position:fixed !important; top:64px; left:0; bottom:0; width:300px !important; z-index:60; transform:translateX(-106%); transition:transform .3s cubic-bezier(.4,0,.2,1); box-shadow:10px 0 40px rgba(20,20,40,.18); }\n    #omas-sidebar.open{ transform:none; }\n    #omas-menu-btn{ display:flex !important; }\n    #omas-content{ padding:34px 22px 120px !important; }\n    #omas-results{ width:calc(100vw - 32px) !important; right:-56px !important; }\n    #omas-doctitle{ display:none !important; }\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"height:100vh; display:flex; flex-direction:column; overflow:hidden; background:#F4F4EE; font-family:'Manrope',system-ui,sans-serif; color:#1B1C33; -webkit-font-smoothing:antialiased;\">\n\n  <!-- ===== TOP BAR ===== -->\n  <header style=\"height:64px; flex:0 0 64px; display:flex; align-items:center; gap:16px; padding:0 22px; background:#FFFFFF; border-bottom:1px solid #E7E7DE; z-index:70; box-shadow:0 1px 0 rgba(0,0,0,0.01);\">\n    <button id=\"omas-menu-btn\" aria-label=\"Menu\" style=\"width:40px; height:40px; border:1px solid #E4E4DC; background:#fff; border-radius:10px; cursor:pointer; align-items:center; justify-content:center; flex-shrink:0;\">\n      <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2D2F84\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M3 6h18M3 12h18M3 18h18\"><\u002Fpath><\u002Fsvg>\n    <\u002Fbutton>\n    <div style=\"display:flex; align-items:center; gap:11px; flex-shrink:0;\">\n      <svg width=\"30\" height=\"30\" viewBox=\"0 0 100 100\" aria-label=\"OMAS\"><circle cx=\"32\" cy=\"38\" r=\"23\" fill=\"#00A09A\"><\u002Fcircle><circle cx=\"68\" cy=\"38\" r=\"23\" fill=\"#2D2F84\"><\u002Fcircle><polygon points=\"10,46 50,46 50,93\" fill=\"#00A09A\"><\u002Fpolygon><polygon points=\"50,46 90,46 50,93\" fill=\"#2D2F84\"><\u002Fpolygon><\u002Fsvg>\n      <div id=\"omas-doctitle\" style=\"line-height:1.1;\">\n        <div style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; letter-spacing:1px; color:#2D2F84;\">LA BIBLE OMAS<\u002Fdiv>\n        <div style=\"font-size:11px; color:#8A8CA0; letter-spacing:.3px;\">Projet OMAS 2050 · v3<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;\"><\u002Fdiv>\n    <div style=\"position:relative; width:min(420px, 46vw);\">\n      <svg style=\"position:absolute; left:14px; top:50%; transform:translateY(-50%); pointer-events:none;\" width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9A9CB0\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M20 20l-3.2-3.2\"><\u002Fpath><\u002Fsvg>\n      <input id=\"omas-search\" type=\"text\" placeholder=\"Rechercher dans la Bible…\" autocomplete=\"off\" spellcheck=\"false\" style=\"width:100%; height:42px; border:1px solid #E1E1D8; background:#F7F7F2; border-radius:11px; padding:0 16px 0 40px; font-family:'Manrope',sans-serif; font-size:14.5px; color:#1B1C33; outline:none;\">\n      <div id=\"omas-results\" style=\"display:none; position:absolute; top:52px; right:0; width:460px; max-height:64vh; overflow-y:auto; background:#fff; border:1px solid #E7E7DE; border-radius:14px; box-shadow:0 24px 60px rgba(20,20,50,0.16); z-index:80;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== BODY ===== -->\n  <div style=\"flex:1; display:flex; min-height:0; position:relative;\">\n    <nav id=\"omas-sidebar\" style=\"width:322px; flex:0 0 322px; background:#FBFBF7; border-right:1px solid #E7E7DE; overflow-y:auto; padding:20px 14px 60px;\">\n      <div style=\"font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:#A9852F; font-weight:700; padding:4px 12px 12px;\">Sommaire<\u002Fdiv>\n      <div id=\"omas-nav-list\"><\u002Fdiv>\n    <\u002Fnav>\n    <main id=\"omas-main\" style=\"flex:1; overflow-y:auto; min-width:0; scroll-behavior:smooth;\">\n      <div id=\"omas-content\" style=\"max-width:800px; margin:0 auto; padding:48px 44px 130px;\">\n        <div style=\"color:#9A9CB0; font-size:15px;\">Chargement du document…<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  \n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() { this.partIndex = 0; this.boot(); }\n\n  boot() {\n    if (!window.marked || !window.OMAS_MD) { setTimeout(() => this.boot(), 80); return; }\n    try { this.init(); } catch (e) { console.error('OMAS init error', e); }\n  }\n\n  esc(s) { return String(s).replace(/&/g, '&amp;').replace(/<\u002Fg, '&lt;').replace(/>/g, '&gt;').replace(/\"/g, '&quot;'); }\n\n  sc(t) {\n    let s = t.toLowerCase();\n    s = s.charAt(0).toUpperCase() + s.slice(1);\n    return s.replace(/\\bomas\\b/g, 'OMAS').replace(/\\bidf\\b/g, 'IDF').replace(/\\brgpd\\b/g, 'RGPD')\n            .replace(/\\bpsc1\\b/g, 'PSC1').replace(/\\bpass\\b/g, 'PASS').replace(/\\bcrm\\b/g, 'CRM');\n  }\n\n  init() {\n    const md = window.OMAS_MD;\n    const M = window.marked;\n    try { (M.setOptions || function(){})({ gfm: true, breaks: false, headerIds: false, mangle: false }); } catch (e) {}\n    const toHtml = (s) => (M.parse ? M.parse(s) : M(s));\n\n    const lines = md.split(/\\r?\\n/);\n    const isPart = (t) => /^(PARTIE\\b|ANNEXES\\b|CONCLUSION\\b)/i.test(t);\n    const isChap = (t) => /^(Chapitre|Annexe)\\b/i.test(t);\n\n    // Split into raw parts (intro bundled as \"Présentation\")\n    let cur = { raw: 'Présentation', body: [] };\n    const raws = [cur];\n    for (let i = 0; i < lines.length; i++) {\n      const line = lines[i];\n      const h = line.match(/^(#{1,6})\\s+(.*)$/);\n      if (h) {\n        const lvl = h[1].length, txt = h[2].trim();\n        if (lvl === 1 && /^LA BIBLE OMAS/i.test(txt)) continue;\n        if (isPart(txt)) { cur = { raw: txt, body: [] }; raws.push(cur); continue; }\n      }\n      cur.body.push(line);\n    }\n\n    this.parts = [];\n    this.searchIndex = [];\n\n    raws.forEach((rp, pi) => {\n      let eyebrow = '', name;\n      if (rp.raw === 'Présentation') { name = 'Présentation'; }\n      else if (rp.raw.indexOf(' : ') >= 0) {\n        const bits = rp.raw.split(' : ');\n        eyebrow = bits[0].trim();\n        name = this.sc(bits.slice(1).join(' : ').trim());\n      } else { name = this.sc(rp.raw.trim()); }\n\n      const chapters = [], norm = [];\n      let curChId = null, curChTitle = name, skip = false;\n\n      rp.body.forEach((line) => {\n        const h = line.match(/^(#{1,6})\\s+(.*)$/);\n        if (h) {\n          const lvl = h[1].length, txt = h[2].trim();\n          if (/^Table des matières/i.test(txt)) { skip = true; return; }\n          if (skip) skip = false;\n          if (/^Document de référence/i.test(txt)) return;\n          const chapterLike = isChap(txt) || pi === 0;\n          if (chapterLike) {\n            const id = 'p' + pi + 'c' + chapters.length;\n            chapters.push({ id, title: txt });\n            curChId = id; curChTitle = txt;\n            norm.push('## ' + txt);\n          } else {\n            const nl = Math.min(6, lvl + 1);\n            norm.push('#'.repeat(nl) + ' ' + txt);\n          }\n          return;\n        }\n        if (skip) return;\n        norm.push(line);\n        let t = line.trim();\n        if (!t || /^\\|/.test(t) || /^-{3,}$/.test(t)) return;\n        t = t.replace(/^[>\\-*]\\s?/, '').replace(/[*_`#]/g, '').trim();\n        if (t) this.searchIndex.push({ partIndex: pi, chapterId: curChId, chapterTitle: curChTitle, text: t });\n      });\n\n      this.parts.push({ navEyebrow: eyebrow, navName: name, chapters, html: toHtml(norm.join('\\n')) });\n    });\n\n    this.wireSearch();\n    this.wireMenu();\n\n    let handled = false;\n    try {\n      const q = new URLSearchParams(location.search).get('q');\n      if (q && q.trim().length >= 2) {\n        const ql = q.trim().toLowerCase();\n        const hit = this.searchIndex.find((it) => it.text.toLowerCase().indexOf(ql) >= 0);\n        if (hit) {\n          const inp = document.getElementById('omas-search');\n          if (inp) inp.value = q.trim();\n          this.goToPart(hit.partIndex, { chapterId: hit.chapterId, highlight: q.trim() });\n          handled = true;\n        }\n      }\n    } catch (e) {}\n    if (!handled) this.goToPart(0);\n  }\n\n  wireMenu() {\n    const b = document.getElementById('omas-menu-btn');\n    const sb = document.getElementById('omas-sidebar');\n    if (b && sb) b.onclick = () => sb.classList.toggle('open');\n  }\n\n  wireSearch() {\n    const inp = document.getElementById('omas-search');\n    const panel = document.getElementById('omas-results');\n    if (!inp) return;\n    inp.addEventListener('input', () => this.runSearch(inp.value));\n    inp.addEventListener('focus', () => { if (inp.value.trim().length >= 2) panel.style.display = 'block'; });\n    document.addEventListener('click', (e) => { if (panel && !panel.contains(e.target) && e.target !== inp) panel.style.display = 'none'; });\n    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && panel) panel.style.display = 'none'; });\n  }\n\n  runSearch(val) {\n    const panel = document.getElementById('omas-results');\n    const q = val.trim();\n    if (q.length < 2) { panel.style.display = 'none'; panel.innerHTML = ''; return; }\n    const ql = q.toLowerCase();\n    const res = [];\n    for (const it of this.searchIndex) {\n      const i = it.text.toLowerCase().indexOf(ql);\n      if (i >= 0) { res.push({ it, i }); if (res.length >= 60) break; }\n    }\n    if (!res.length) {\n      panel.innerHTML = '<div style=\"padding:20px;color:#8A8CA0;font-size:14px;\">Aucun résultat pour « ' + this.esc(q) + ' »<\u002Fdiv>';\n      panel.style.display = 'block'; return;\n    }\n    panel.innerHTML = '<div style=\"padding:11px 18px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#00A09A;font-weight:700;border-bottom:1px solid #EEE;position:sticky;top:0;background:#fff;\">' + res.length + ' passage' + (res.length > 1 ? 's' : '') + '<\u002Fdiv>';\n    res.forEach((r) => {\n      const it = r.it, i = r.i;\n      const start = Math.max(0, i - 45);\n      const pre = (start > 0 ? '… ' : '') + this.esc(it.text.slice(start, i));\n      const mid = this.esc(it.text.slice(i, i + q.length));\n      const tail = it.text.slice(i + q.length, i + q.length + 95);\n      const post = this.esc(tail) + (it.text.length > i + q.length + 95 ? ' …' : '');\n      const btn = document.createElement('button');\n      btn.style.cssText = 'display:block;width:100%;text-align:left;border:none;border-bottom:1px solid #F0F0EA;background:transparent;cursor:pointer;padding:12px 18px;';\n      btn.onmouseenter = () => btn.style.background = '#F7F7F2';\n      btn.onmouseleave = () => btn.style.background = 'transparent';\n      btn.innerHTML = '<div style=\"font-size:11.5px;color:#00A09A;font-weight:700;margin-bottom:3px;\">' + this.esc(it.chapterTitle || this.parts[it.partIndex].navName) + '<\u002Fdiv>'\n        + '<div style=\"font-size:13.5px;color:#4A4C63;line-height:1.5;\">' + pre + '<mark style=\"background:#F6E6A8;\">' + mid + '<\u002Fmark>' + post + '<\u002Fdiv>';\n      btn.onclick = () => { this.goToPart(it.partIndex, { chapterId: it.chapterId, highlight: q }); panel.style.display = 'none'; };\n      panel.appendChild(btn);\n    });\n    panel.style.display = 'block';\n  }\n\n  goToPart(pi, opts) {\n    opts = opts || {};\n    if (pi < 0 || pi >= this.parts.length) return;\n    this.partIndex = pi;\n    const p = this.parts[pi];\n    const c = document.getElementById('omas-content');\n    const btnStyle = 'flex:1;max-width:340px;text-align:left;border:1px solid #E4E4DC;background:#fff;border-radius:12px;padding:13px 18px;cursor:pointer;font-family:inherit;transition:border-color .2s,box-shadow .2s;';\n\n    c.innerHTML =\n      '<div style=\"margin-bottom:30px;\">' +\n        (p.navEyebrow ? '<div style=\"font-family:\\'Space Grotesk\\',sans-serif;font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:#00A09A;font-weight:700;margin-bottom:10px;\">' + this.esc(p.navEyebrow) + '<\u002Fdiv>' : '') +\n        '<h1 style=\"font-family:\\'Space Grotesk\\',sans-serif;font-weight:700;font-size:clamp(28px,4vw,40px);line-height:1.1;color:#1B1C33;margin:0;text-wrap:balance;\">' + this.esc(p.navName) + '<\u002Fh1>' +\n        '<div style=\"height:3px;width:56px;background:#C8A951;border-radius:2px;margin-top:18px;\"><\u002Fdiv>' +\n      '<\u002Fdiv>' +\n      '<div id=\"omas-prose\" class=\"omas-prose\">' + p.html + '<\u002Fdiv>' +\n      '<div style=\"display:flex;gap:14px;margin-top:56px;padding-top:28px;border-top:1px solid #E7E7DE;\">' +\n        (pi > 0\n          ? '<button id=\"omas-prev\" style=\"' + btnStyle + '\"><div style=\"font-size:11px;color:#9A9CB0;font-weight:700;letter-spacing:.5px;margin-bottom:3px;\">‹ PRÉCÉDENT<\u002Fdiv><div style=\"font-family:\\'Space Grotesk\\',sans-serif;font-weight:600;font-size:14.5px;color:#2D2F84;\">' + this.esc(this.parts[pi - 1].navName) + '<\u002Fdiv><\u002Fbutton>'\n          : '<span style=\"flex:1;\"><\u002Fspan>') +\n        (pi < this.parts.length - 1\n          ? '<button id=\"omas-next\" style=\"' + btnStyle + 'text-align:right;\"><div style=\"font-size:11px;color:#9A9CB0;font-weight:700;letter-spacing:.5px;margin-bottom:3px;\">SUIVANT ›<\u002Fdiv><div style=\"font-family:\\'Space Grotesk\\',sans-serif;font-weight:600;font-size:14.5px;color:#2D2F84;\">' + this.esc(this.parts[pi + 1].navName) + '<\u002Fdiv><\u002Fbutton>'\n          : '<span style=\"flex:1;\"><\u002Fspan>') +\n      '<\u002Fdiv>';\n\n    // stamp chapter ids on chapter headings (h2)\n    const hs = c.querySelectorAll('#omas-prose h2');\n    p.chapters.forEach((ch, ci) => { if (hs[ci]) hs[ci].id = ch.id; });\n\n    const pv = document.getElementById('omas-prev');\n    if (pv) { pv.onclick = () => this.goToPart(pi - 1); pv.onmouseenter = () => { pv.style.borderColor = '#00A09A'; pv.style.boxShadow = '0 4px 16px rgba(0,160,154,.1)'; }; pv.onmouseleave = () => { pv.style.borderColor = '#E4E4DC'; pv.style.boxShadow = 'none'; }; }\n    const nx = document.getElementById('omas-next');\n    if (nx) { nx.onclick = () => this.goToPart(pi + 1); nx.onmouseenter = () => { nx.style.borderColor = '#00A09A'; nx.style.boxShadow = '0 4px 16px rgba(0,160,154,.1)'; }; nx.onmouseleave = () => { nx.style.borderColor = '#E4E4DC'; nx.style.boxShadow = 'none'; }; }\n\n    this.renderSidebar();\n    this.setupSpy();\n\n    const main = document.getElementById('omas-main');\n    if (opts.highlight) this.highlight(opts.highlight);\n    let target = null;\n    if (opts.highlight) target = document.querySelector('#omas-prose mark');\n    if (!target && opts.chapterId) target = document.getElementById(opts.chapterId);\n    if (target) { main.scrollTop = 0; requestAnimationFrame(() => this.scrollToEl(target)); }\n    else { main.scrollTo({ top: 0, behavior: 'auto' }); }\n\n    document.getElementById('omas-sidebar').classList.remove('open');\n  }\n\n  scrollToEl(el) {\n    if (!el) return;\n    const main = document.getElementById('omas-main');\n    const er = el.getBoundingClientRect(), mr = main.getBoundingClientRect();\n    const top = main.scrollTop + (er.top - mr.top) - 22;\n    main.scrollTo({ top: top, behavior: 'smooth' });\n  }\n\n  setupSpy() {\n    if (this.spy) this.spy.disconnect();\n    const main = document.getElementById('omas-main');\n    const hs = Array.prototype.slice.call(document.querySelectorAll('#omas-prose h2'));\n    if (!hs.length) return;\n    this.spy = new IntersectionObserver((entries) => {\n      entries.forEach((e) => { if (e.isIntersecting) this.setActiveChapter(e.target.id); });\n    }, { root: main, rootMargin: '0px 0px -72% 0px', threshold: 0 });\n    hs.forEach((h) => this.spy.observe(h));\n  }\n\n  setActiveChapter(id) {\n    this.activeChapterId = id;\n    if (!this.sideCh) return;\n    Object.keys(this.sideCh).forEach((k) => {\n      const el = this.sideCh[k], on = k === id;\n      el.style.color = on ? '#A9852F' : '#5A5C72';\n      el.style.fontWeight = on ? '700' : '500';\n      el.style.borderLeftColor = on ? '#C8A951' : 'transparent';\n      el.style.background = on ? '#FBF6E6' : 'transparent';\n    });\n  }\n\n  renderSidebar() {\n    const list = document.getElementById('omas-nav-list');\n    list.innerHTML = '';\n    this.sideCh = {};\n    this.parts.forEach((p, pi) => {\n      const active = pi === this.partIndex;\n      const wrap = document.createElement('div');\n      wrap.style.marginBottom = '1px';\n      const btn = document.createElement('button');\n      btn.style.cssText = 'display:block;width:100%;text-align:left;border:none;background:' + (active ? '#EEF0FF' : 'transparent') + ';cursor:pointer;padding:10px 12px;border-radius:9px;transition:background .15s;';\n      if (!active) { btn.onmouseenter = () => btn.style.background = '#F1F1EA'; btn.onmouseleave = () => btn.style.background = 'transparent'; }\n      btn.innerHTML =\n        (p.navEyebrow ? '<span style=\"display:block;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:#00A09A;font-weight:700;margin-bottom:2px;\">' + this.esc(p.navEyebrow) + '<\u002Fspan>' : '') +\n        '<span style=\"display:block;font-family:\\'Space Grotesk\\',sans-serif;font-weight:' + (active ? '700' : '600') + ';font-size:14px;color:' + (active ? '#2D2F84' : '#40415A') + ';line-height:1.3;\">' + this.esc(p.navName) + '<\u002Fspan>';\n      btn.onclick = () => this.goToPart(pi);\n      wrap.appendChild(btn);\n\n      if (active && p.chapters.length) {\n        const sub = document.createElement('div');\n        sub.style.cssText = 'margin:4px 0 10px 8px;';\n        p.chapters.forEach((ch) => {\n          const cb = document.createElement('button');\n          cb.style.cssText = 'display:block;width:100%;text-align:left;border:none;border-left:2px solid transparent;background:transparent;cursor:pointer;padding:7px 10px 7px 13px;font-size:12.5px;color:#5A5C72;font-weight:500;line-height:1.4;border-radius:0 7px 7px 0;';\n          cb.textContent = ch.title;\n          cb.onclick = () => {\n            const el = document.getElementById(ch.id);\n            if (el) this.scrollToEl(el);\n            document.getElementById('omas-sidebar').classList.remove('open');\n          };\n          this.sideCh[ch.id] = cb;\n          sub.appendChild(cb);\n        });\n        wrap.appendChild(sub);\n      }\n      list.appendChild(wrap);\n    });\n  }\n\n  highlight(term) {\n    const prose = document.getElementById('omas-prose');\n    if (!prose) return;\n    const q = term.trim();\n    if (!q) return;\n    const ql = q.toLowerCase();\n    const rx = new RegExp('(' + q.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\\\$&') + ')', 'gi');\n    const walker = document.createTreeWalker(prose, NodeFilter.SHOW_TEXT, null);\n    const nodes = [];\n    while (walker.nextNode()) {\n      const n = walker.currentNode;\n      if (n.parentNode && n.parentNode.nodeName !== 'MARK' && n.nodeValue.toLowerCase().indexOf(ql) >= 0) nodes.push(n);\n    }\n    nodes.forEach((n) => {\n      const span = document.createElement('span');\n      span.innerHTML = this.esc(n.nodeValue).replace(rx, '<mark>$1<\u002Fmark>');\n      n.parentNode.replaceChild(span, n);\n    });\n  }\n\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
